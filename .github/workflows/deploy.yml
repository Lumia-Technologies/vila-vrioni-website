name: Deploy to vrioni.al & GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ftp-deploy:
    name: Deploy to vrioni.al via FTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy via lftp
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes
            set ftp:ssl-force no
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            set net:timeout 30
            set net:max-retries 3
            set net:reconnect-interval-base 5
            set ftp:use-epsv4 yes
            open -u \$FTP_USER,\$FTP_PASS ftp://ftp.vrioni.al
            mirror --reverse --delete --verbose --parallel=3 --exclude .git/ --exclude .github/ --exclude .claude/ . /
            quit
          "

  pages-deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
